<div class="profile-hero">
    <div class="banner" style="background-image: url('banner-profile/banner.png')"></div>
    <div class="banner-overlay"></div>
    <div class="profile-content">
        <div class="profile-pic">
            <img src="banner-profile/profile.png" alt="Soul portrait">
        </div>
        <h1 class="profile-name">Soul</h1>
        <div class="profile-username">@Sipsofthesoul</div>
        <p class="profile-bio">Every sip, a story. Every verse, a feeling.</p>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalPoems">0</div><div class="stat-label">Poems</div></div>
            <div class="stat-card"><div class="stat-number" id="totalCollections">0</div><div class="stat-label">Collections</div></div>
            <div class="stat-card"><div class="stat-number" id="totalWords">0</div><div class="stat-label">Words</div></div>
            <div class="stat-card"><div class="stat-number" id="avgReadingTime">0</div><div class="stat-label">min avg</div></div>
        </div>

        <div class="featured-showcase">
            <div class="featured-label"><i class="fas fa-star-of-life"></i> Poem of the moment</div>
            <div class="featured-poem-card" id="featuredPoemCard">
                <div class="featured-loading">Loading inspiration...</div>
            </div>
        </div>

        <div class="home-quote">
            <i class="fas fa-quote-left"></i>
            <p>Poetry is the rhythm of the soul's deepest whisper.</p>
            <i class="fas fa-quote-right"></i>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="btn-collections"><i class="fas fa-book-open"></i> Explore Collections</button>
            <button class="nav-btn" id="btn-about"><i class="fas fa-feather"></i> My Journey</button>
            <button class="nav-btn" id="btn-contact"><i class="fas fa-paper-plane"></i> Connect</button>
        </div>
    </div>
</div>
